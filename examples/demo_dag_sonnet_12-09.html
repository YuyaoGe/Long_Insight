<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            overflow: hidden;
        }

        .header {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 15px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
        }

        .stat-item span {
            color: #667eea;
            font-weight: 600;
        }

        #graph-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
        }

        #graph {
            width: 100%;
            height: 100%;
            cursor: grab;
        }

        #graph:active {
            cursor: grabbing;
        }

        /* 悬停提示框 */
        .tooltip {
            position: fixed;
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(102, 126, 234, 0.5);
            border-radius: 8px;
            padding: 12px 15px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 350px;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .tooltip.visible {
            opacity: 1;
        }

        .tooltip-title {
            font-weight: 600;
            font-size: 14px;
            color: #667eea;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tooltip-title .step-num {
            background: #667eea;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .tooltip-type {
            font-size: 11px;
            color: #888;
            margin-bottom: 8px;
        }

        .tooltip-summary {
            font-size: 12px;
            color: #ccc;
            line-height: 1.5;
        }

        /* 详情弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: linear-gradient(135deg, #1e1e30 0%, #252540 100%);
            border: 1px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            max-width: 700px;
            max-height: 80vh;
            width: 90%;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            background: rgba(102, 126, 234, 0.1);
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .modal-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .modal-step-num {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }

        .modal-title-group h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .modal-type {
            font-size: 12px;
            color: #667eea;
            background: rgba(102, 126, 234, 0.15);
            padding: 3px 10px;
            border-radius: 4px;
            display: inline-block;
        }

        .modal-close {
            background: none;
            border: none;
            color: #888;
            font-size: 28px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .modal-close:hover {
            color: #fff;
        }

        .modal-body {
            padding: 25px;
            overflow-y: auto;
            max-height: calc(80vh - 100px);
        }

        .modal-info-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .modal-info-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 13px;
        }

        .modal-info-item label {
            color: #888;
            display: block;
            margin-bottom: 3px;
            font-size: 11px;
        }

        .modal-info-item span {
            color: #667eea;
            font-weight: 600;
        }

        .modal-section {
            margin-bottom: 20px;
        }

        .modal-section:last-child {
            margin-bottom: 0;
        }

        .modal-section h4 {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-section p {
            font-size: 14px;
            line-height: 1.7;
            color: #ccc;
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        /* 控制按钮 */
        .controls {
            position: fixed;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* 图例 */
        .legend {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 11px;
            z-index: 100;
            max-height: calc(100vh - 200px);
            overflow-y: auto;
        }

        .legend-title {
            font-weight: 600;
            margin-bottom: 8px;
            color: #888;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 4px;
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .legend-item:last-child {
            margin-bottom: 0;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .legend-count {
            color: #666;
            margin-left: auto;
        }

        /* 节点样式 */
        .node {
            cursor: pointer;
        }

        .node rect {
            stroke-width: 2px;
            transition: all 0.15s;
        }

        .node:hover rect {
            filter: brightness(1.3);
            stroke-width: 3px;
        }

        .node.highlighted rect {
            stroke: #fff !important;
            stroke-width: 3px;
        }

        .node.dimmed {
            opacity: 0.3;
        }

        .node text {
            fill: #fff;
            pointer-events: none;
        }

        .link {
            fill: none;
            stroke: rgba(102, 126, 234, 0.3);
            stroke-width: 1.5px;
        }

        .link.highlighted {
            stroke: rgba(102, 126, 234, 0.8);
            stroke-width: 2.5px;
        }

        /* 多父节点标记 */
        .multi-parent-indicator {
            fill: #ffc107;
            font-size: 10px;
        }
    </style>
</head>

            const nodeById = {};
            allNodes.forEach(n => nodeById[n.id] = n);

            // 构建子节点映射
            const childrenMap = {};
            allLinks.forEach(link => {
                if (!childrenMap[link.source]) childrenMap[link.source] = [];
                childrenMap[link.source].push(link.target);
            });

            // 使用BFS计算深度
            const visited = new Set();
            const queue = [];

            // 从根节点开始
            graphData.root_ids.forEach(id => {
                if (nodeById[id]) {
                    nodeById[id].depth = 0;
                    queue.push(id);
                    visited.add(id);
                }
            });

            while (queue.length > 0) {
                const currentId = queue.shift();
                const currentNode = nodeById[currentId];
                const children = childrenMap[currentId] || [];

                children.forEach(childId => {
                    const childNode = nodeById[childId];
                    if (childNode) {
                        // 取最大深度（因为可能有多个父节点）
                        const newDepth = currentNode.depth + 1;
                        if (newDepth > childNode.depth) {
                            childNode.depth = newDepth;
                        }
                        if (!visited.has(childId)) {

                            queue.push(childId);

        function shadeColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = (num >> 16) + amt;
            const G = (num >> 8 & 0x00FF) + amt;
            const B = (num & 0x0000FF) + amt;
            return '#' + (0x1000000 + (R < 255 ? R < 1 ? 0 : R : 255) * 0x10000 +
                (G < 255 ? G < 1 ? 0 : G : 255) * 0x100 +
                (B < 255 ? B < 1 ? 0 : B : 255)).toString(16).slice(1);

        // 提示框
        function showTooltip(event, node) {
            const tooltip = document.getElementById('tooltip');
            const summary = node.summary.length > 150 ? node.summary.substring(0, 150) + '...' : node.summary;
            const parentInfo = formatParentIds(node.parent_ids);
            tooltip.innerHTML = `
                <div class="tooltip-title">
                    <span class="step-num">#${node.id}</span>
                    ${node.title}
                </div>
                <div class="tooltip-type">${node.type} | 轮数: ${node.start_turn}-${node.end_turn} | 父节点: ${parentInfo}</div>
                <div class="tooltip-summary">${summary || '无摘要'}</div>
            `;
            tooltip.classList.add('visible');
            moveTooltip(event);
        }

        function moveTooltip(event) {
            const tooltip = document.getElementById('tooltip');
            let x = event.clientX + 15;
            let y = event.clientY + 15;

            // 防止超出屏幕
            const rect = tooltip.getBoundingClientRect();
            const maxX = window.innerWidth - 370;
            const maxY = window.innerHeight - rect.height - 20;

            if (x > maxX) x = event.clientX - 360;
            if (y > maxY) y = event.clientY - rect.height - 15;

            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        // 弹窗
        function showModal(node) {
            document.getElementById('modal-num').textContent = node.id;
            document.getElementById('modal-title').textContent = node.title;
            document.getElementById('modal-type').textContent = node.type;
            document.getElementById('modal-start').textContent = node.start_turn;
            document.getElementById('modal-end').textContent = node.end_turn;
            document.getElementById('modal-parent').textContent = formatParentIds(node.parent_ids);
            document.getElementById('modal-summary').textContent = node.summary || '无摘要';
            document.getElementById('modal-detail').textContent = node.detail || '无详细操作';
            document.getElementById('modal-overlay').classList.add('visible');
        }

        function closeModal() {
            document.getElementById('modal-overlay').classList.remove('visible');
        }

        // 缩放和拖拽
        function initZoomPan() {
            svg.addEventListener('mousedown', (e) => {
                if (e.target === svg || e.target.tagName === 'svg') {
                    isPanning = true;
                    startX = e.clientX - translateX;
                    startY = e.clientY - translateY;
                    svg.style.cursor = 'grabbing';
                }
            });

            svg.addEventListener('mousemove', (e) => {
                if (isPanning) {
                    translateX = e.clientX - startX;
                    translateY = e.clientY - startY;
                    updateTransform();
                }
            });

            svg.addEventListener('mouseup', () => {
                isPanning = false;
                svg.style.cursor = 'grab';
            });

            svg.addEventListener('mouseleave', () => {
                isPanning = false;
                svg.style.cursor = 'grab';
            });

            svg.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                const newScale = scale * delta;
                if (newScale >= 0.1 && newScale <= 4) {
                    // 以鼠标位置为中心缩放
                    const rect = svg.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;

                    translateX = mouseX - (mouseX - translateX) * delta;
                    translateY = mouseY - (mouseY - translateY) * delta;
                    scale = newScale;
                    updateTransform();
                }
            });

            // 点击空白处关闭弹窗
            document.getElementById('modal-overlay').addEventListener('click', (e) => {
                if (e.target.id === 'modal-overlay') {
                    closeModal();
                }
            });

            // ESC关闭弹窗
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });

            // 点击SVG空白处（非节点）不做特殊处理
            svg.addEventListener('click', (e) => {
                // 空白处点击不需要做什么
            });
        }

        function updateTransform() {
            mainGroup.setAttribute('transform', `translate(${translateX}, ${translateY}) scale(${scale})`);
        }

        function zoomIn() {
            scale *= 1.3;
            if (scale > 4) scale = 4;
            updateTransform();
        }

        function zoomOut() {
            scale *= 0.7;
            if (scale < 0.1) scale = 0.1;
            updateTransform();
        }

        function resetView() {
            fitToScreen();
        }

        function fitToScreen() {
            const bbox = mainGroup.getBBox();
            const container = document.getElementById('graph-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            if (bbox.width === 0 || bbox.height === 0) {
                scale = 1;
                translateX = width / 2;
                translateY = height / 2;
            } else {
                const padding = 50;
                const scaleX = (width - padding * 2) / bbox.width;
                const scaleY = (height - padding * 2) / bbox.height;
                scale = Math.min(scaleX, scaleY, 1) * 0.85;

                translateX = width / 2 - (bbox.x + bbox.width / 2) * scale;
                translateY = height / 2 - (bbox.y + bbox.height / 2) * scale;
            }

            updateTransform();
        }

        function toggleLayout() {
            isHorizontal = !isHorizontal;
            drawGraph();
            setTimeout(fitToScreen, 50);
        }

        // 图例
        function generateLegend() {
            const legend = document.getElementById('legend');
            // 清除旧内容（保留标题）
            const title = legend.querySelector('.legend-title');
            legend.innerHTML = '';
            legend.appendChild(title);

            const typeCounts = {};
            allNodes.forEach(n => {
                typeCounts[n.type] = (typeCounts[n.type] || 0) + 1;
            });

            const sortedTypes = Object.entries(typeCounts).sort((a, b) => b[1] - a[1]);

            sortedTypes.forEach(([type, count]) => {
                const color = colorMap[type] || colorMap['默认'];
                const item = document.createElement('div');
                item.className = 'legend-item';
                item.innerHTML = `
                    <div class="legend-color" style="background: ${color}"></div>
                    <span>${type}</span>
                    <span class="legend-count">${count}</span>
                `;
                item.addEventListener('click', () => highlightType(type));
                legend.appendChild(item);
            });
        }

        function highlightType(type) {
            const nodes = document.querySelectorAll('.node');
            nodes.forEach(node => {
                const id = parseInt(node.getAttribute('data-id'));
                const nodeData = allNodes.find(n => n.id === id);
                if (nodeData && nodeData.type === type) {
                    node.classList.remove('dimmed');
                    node.classList.add('highlighted');
                } else {
                    node.classList.remove('highlighted');
                    node.classList.add('dimmed');
                }
            });

            // 2秒后恢复
            setTimeout(() => {
                nodes.forEach(node => {
                    node.classList.remove('dimmed', 'highlighted');
                });
            }, 2000);
        }

        // 窗口调整
        window.addEventListener('resize', () => {
            const container = document.getElementById('graph-container');
            svg.setAttribute('width', container.clientWidth);
            svg.setAttribute('height', container.clientHeight);
        });

        // 启动
        init();
    </script>
</body>
</html>
